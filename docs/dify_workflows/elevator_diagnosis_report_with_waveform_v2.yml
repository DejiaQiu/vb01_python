    - data:
        code: "import re\n\n\ndef _pick_elevator_id(text):\n    query = str(text or\
          \ \"\").strip()\n    if not query:\n        return \"\"\n    patterns =\
          \ [\n        r\"elevator[_-]?(\\d{1,4})\",\n        r\"(\\d{1,4})\\s*号梯\"\
          ,\n        r\"电梯\\s*(\\d{1,4})\",\n        r\"梯\\s*(\\d{1,4})\",\n    ]\n\
          \    for pattern in patterns:\n        match = re.search(pattern, query,\
          \ flags=re.IGNORECASE)\n        if match:\n            return match.group(1).zfill(3)\n\
          \    return \"\"\n\n\ndef main(query):\n    elevator_id = _pick_elevator_id(query)\n\
          \    target_text = f\"elevator_{elevator_id}\" if elevator_id else \"default\"\
          \n    return {\n        \"elevator_id\": elevator_id,\n        \"target_text\"\
          : target_text,\n    }\n"
        code_language: python3
        desc: ''
        outputs:
          elevator_id:
            children: null
            type: string
          target_text:
            children: null
            type: string
        selected: false
        title: 解析目标电梯
        type: code
        variables:
        - value_selector:
          - sys
          - query
          value_type: string
          variable: query
      height: 52
