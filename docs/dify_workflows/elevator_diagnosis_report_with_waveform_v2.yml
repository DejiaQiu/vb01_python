    - data:
        code: |
          import csv
          import io
          import json
          
          
          def _pick_text(value):
              if isinstance(value, list):
                  for item in value:
                      text = str(item).strip()
                      if text:
                          return text
                  return ""
              return str(value or "").strip()
          
          
          def _from_markdown_table(text):
              lines = [line.rstrip() for line in text.splitlines() if line.strip()]
              if len(lines) < 2:
                  return ""
              if "|" not in lines[0] or "---" not in lines[1]:
                  return ""
          
              def split_row(line):
                  return [part.strip() for part in line.strip().strip("|").split("|")]
          
              headers = split_row(lines[0])
              if not headers:
                  return ""
          
              rows = []
              for line in lines[2:]:
                  if "|" not in line:
                      continue
                  parts = split_row(line)
                  if len(parts) < len(headers):
                      parts.extend([""] * (len(headers) - len(parts)))
                  rows.append(parts[: len(headers)])
          
              if not rows:
                  return ""
          
              buffer = io.StringIO()
              writer = csv.writer(buffer)
              writer.writerow(headers)
              writer.writerows(rows)
              return buffer.getvalue()
          
          
          def _normalize_csv_like(text):
              sample = text[:2048]
              try:
                  dialect = csv.Sniffer().sniff(sample, delimiters=",;\t")
              except Exception:
                  dialect = csv.excel
          
              rows = []
              reader = csv.reader(io.StringIO(text), dialect)
              for row in reader:
                  if any(str(cell).strip() for cell in row):
                      rows.append([str(cell).strip() for cell in row])
          
              if len(rows) < 2:
                  return text
          
              width = max(len(row) for row in rows)
              buffer = io.StringIO()
              writer = csv.writer(buffer)
              for row in rows:
                  writer.writerow(row + [""] * (width - len(row)))
              return buffer.getvalue()
          
          
          def main(extracted_text, site_name):
              raw_text = _pick_text(extracted_text)
              csv_text = _from_markdown_table(raw_text) or _normalize_csv_like(raw_text)
              preview = "\n".join(csv_text.splitlines()[:6])
              diagnosis_body = json.dumps(
                  {"csv_text": csv_text, "rows": []},
                  ensure_ascii=False,
              )
              waveform_body = json.dumps(
                  {
                      "csv_text": csv_text,
                      "rows": [],
                      "width": 920,
                      "height": 320,
                      "max_points": 240,
                  },
                  ensure_ascii=False,
              )
              maintenance_body = json.dumps(
                  {"site_name": site_name or "unknown-site"},
                  ensure_ascii=False,
              )
              return {
                  "csv_text": csv_text,
                  "preview": preview,
                  "diagnosis_body": diagnosis_body,
                  "waveform_body": waveform_body,
                  "maintenance_body": maintenance_body,
              }
        code_language: python3
