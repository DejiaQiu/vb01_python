    - data:
        code: |
          import json
          
          
          def main(body):
              text = str(body or "").strip()
              try:
                  payload = json.loads(text) if text else {}
              except Exception:
                  payload = {}
              screening = payload.get("screening", {}) if isinstance(payload, dict) else {}
              status = str(screening.get("status", "unknown"))
              top_candidate = screening.get("top_candidate", {}) if isinstance(screening, dict) else {}
              top_fault = str(top_candidate.get("fault_type", ""))
              top_score = top_candidate.get("score", 0)
              if top_fault:
                  summary = f"筛查状态：{status}；高置信候选：{top_fault}；分数：{top_score}。"
              else:
                  watch_faults = screening.get("watch_faults", []) if isinstance(screening, dict) else []
                  if watch_faults:
                      first = watch_faults[0]
                      summary = f"筛查状态：{status}；重点关注：{first.get('fault_type', 'unknown')}。"
                  else:
                      summary = f"筛查状态：{status}。"
              return {
                  "diagnosis_json": json.dumps(payload, ensure_ascii=False),
                  "status": status,
                  "top_fault": top_fault,
                  "summary": summary,
              }
        code_language: python3
