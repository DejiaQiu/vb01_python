          report_markdown_draft:
            children: null
            type: string
          report_markdown_for_llm:
            children: null
            type: string
          report_tables_html:
            children: null
            type: string
          report_tables_text:
            children: null
            type: string
          spectrum_chart:
            children: null
            type: string
          status_json:
            children: null
            type: string
          status_summary:
            children: null
            type: string
          waveform_insights:
            children: null
            type: string
          waveform_markdown:
            children: null
            type: string
        selected: false
        title: 解析最新状态
        type: code
        variables:
        - value_selector:
          - status_http
          - body
          value_type: string
          variable: body
