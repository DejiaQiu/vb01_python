    - data:
        code: "import json\n\n\ndef _as_dict(value):\n    return value if isinstance(value,\
          \ dict) else {}\n\n\ndef _fault_text(primary, candidate):\n    fault_type\
          \ = str(primary.get(\"fault_type\") or candidate.get(\"fault_type\") or \"none\")\n\
          \    if fault_type == \"rope_tension_abnormal\":\n        return \"钢丝绳状态异常\"\
          \n    if fault_type == \"rope_looseness\":\n        return \"钢丝绳松动或张力不均\"\
          \n    if fault_type == \"rubber_hardening\":\n        return \"橡胶圈硬化\"\
          \n    if fault_type == \"unknown\":\n        return \"异常类型待确认\"\n    return fault_type\n\n\ndef main(body):\n    text = str(body or \"\
          \").strip()\n    try:\n        payload = json.loads(text) if text else\
          \ {}\n    except Exception:\n        payload = {}\n    payload = payload\
          \ if isinstance(payload, dict) else {}\n    screening = _as_dict(payload.get(\"screening\"\
          ))\n    status = str(screening.get(\"status\", \"unknown\"))\n    primary_issue\
          \ = _as_dict(payload.get(\"primary_issue\"))\n    rope_primary = _as_dict(payload.get(\"rope_primary\"\
          ))\n    top_candidate = _as_dict(payload.get(\"top_candidate\"\
          ))\n    auxiliary_results = payload.get(\"auxiliary_results\", []) if isinstance(payload.get(\"\
          auxiliary_results\"), list) else []\n    first_aux = auxiliary_results[0] if auxiliary_results and isinstance(auxiliary_results[0], dict) else {}\n\
          \    branch = str(rope_primary.get(\"rope_branch\", \"\")).strip()\n   \
          \ if primary_issue.get(\"fault_type\") or top_candidate.get(\"fault_type\"\
          ):\n        summary = (\n            f\"筛查状态：{status}；主结论：{_fault_text(primary_issue,\
          \ top_candidate)}；\"\n            f\"分数：{primary_issue.get('score', top_candidate.get('score',\
          \ 0))}；分支：{branch or 'unknown'}；\"\n            f\"辅助异常：{first_aux.get('fault_type',\
          \ 'none')}。\"\n        )\n    else:\n        summary = f\"筛查状态：{status}。\"\
          \n    return {\n        \"diagnosis_json\": json.dumps(payload, ensure_ascii=False),\n\
          \        \"diagnosis_summary\": summary,\n    }\n"
