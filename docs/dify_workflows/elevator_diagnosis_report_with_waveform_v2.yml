        code: |
          import json
          
          
          def main(body):
              text = str(body or "").strip()
              try:
                  payload = json.loads(text) if text else {}
              except Exception:
                  payload = {}
              screening = payload.get("screening", {}) if isinstance(payload, dict) else {}
              status = str(screening.get("status", "unknown"))
              top_candidate = payload.get("top_candidate", {}) if isinstance(payload, dict) else {}
              if isinstance(top_candidate, dict) and top_candidate.get("fault_type"):
                  summary = f"筛查状态：{status}；高置信候选：{top_candidate.get('fault_type')}；分数：{top_candidate.get('score', 0)}。"
              else:
                  summary = f"筛查状态：{status}。"
              return {
                  "diagnosis_json": json.dumps(payload, ensure_ascii=False),
                  "diagnosis_summary": summary,
              }
