      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import html\nimport json\nfrom datetime import datetime\n\n\ndef _as_dict(value):\n\
          \    return value if isinstance(value, dict) else {}\n\n\ndef _format_detected_at(value):\n\
          \    try:\n        ts_ms = int(float(value))\n    except (TypeError, ValueError):\n\
          \        return \"未提供\"\n    if ts_ms <= 0:\n        return \"未提供\"\n  \
          \  return datetime.fromtimestamp(ts_ms / 1000.0).strftime(\"%Y-%m-%d %H:%M:%S\"\
          )\n\n\ndef _option_json(payload, key):\n    echarts = _as_dict(payload.get(\"\
          echarts\"))\n    item = _as_dict(echarts.get(key))\n    return str(item.get(\"\
          option_json\") or \"\").strip()\n\n\ndef _fault_text(primary, preferred,\
          \ candidate):\n    fault_type = str(primary.get(\"fault_type\") or preferred.get(\"\
          fault_type\") or candidate.get(\"fault_type\") or \"none\")\n    if fault_type\
          \ == \"rope_tension_abnormal\":\n        return \"钢丝绳状态异常\"\n    if fault_type\
          \ == \"rope_looseness\":\n        return \"钢丝绳松动或张力不均\"\n    if fault_type\
          \ == \"rubber_hardening\":\n        return \"橡胶圈硬化\"\n    if fault_type\
          \ == \"unknown\":\n        return \"异常类型待确认\"\n    return fault_type\n\n\
          \ndef _display_conclusion(status, fault_text):\n    if status == \"normal\"\
          :\n        return \"当前未见明确异常证据\"\n    if status == \"watch_only\" and fault_text\
          \ == \"异常类型待确认\":\n        return \"已检测到异常，但类型待确认\"\n    return fault_text\n\
          \n\ndef _extract_markdown_tables(text):\n    lines = str(text or \"\").splitlines()\n\
          \    tables = []\n    current = []\n    for line in lines:\n        stripped\
          \ = line.rstrip()\n        if \"|\" in stripped and stripped.strip().startswith(\"\
          |\"):\n            current.append(stripped)\n            continue\n    \
          \    if current:\n            if len(current) >= 2 and \"---\" in current[1]:\n\
          \                tables.append(current)\n            current = []\n    if\
          \ current and len(current) >= 2 and \"---\" in current[1]:\n        tables.append(current)\n\
          \    return tables\n\n\ndef _table_block_to_html(lines):\n    def split_row(line):\n\
          \        return [part.strip() for part in line.strip().strip(\"|\").split(\"\
          |\")]\n\n    headers = split_row(lines[0])\n    body_lines = lines[2:]\n\
          \    rows = []\n    for line in body_lines:\n        if \"|\" not in line:\n\
          \            continue\n        parts = split_row(line)\n        if len(parts)\
          \ < len(headers):\n            parts.extend([\"\"] * (len(headers) - len(parts)))\n\
          \        rows.append(parts[: len(headers)])\n    if not headers or not rows:\n\
          \        return \"\"\n\n    parts = [\"<table>\", \"<thead><tr>\"]\n   \
          \ for head in headers:\n        parts.append(f\"<th>{html.escape(head)}</th>\"\
          )\n    parts.append(\"</tr></thead><tbody>\")\n    for row in rows:\n  \
          \      parts.append(\"<tr>\")\n        for cell in row:\n            parts.append(f\"\
          <td>{html.escape(cell)}</td>\")\n        parts.append(\"</tr>\")\n    parts.append(\"\
          </tbody></table>\")\n    return \"\".join(parts)\n\n\ndef _tables_to_html(text):\n\
          \    blocks = _extract_markdown_tables(text)\n    html_tables = [_table_block_to_html(block)\
          \ for block in blocks]\n    html_tables = [item for item in html_tables\
          \ if item]\n    if not html_tables:\n        return \"\"\n    return \"\\\
          n\\n\".join(html_tables)\n\n\ndef _table_block_to_text(lines):\n    def\
          \ split_row(line):\n        return [part.strip() for part in line.strip().strip(\"\
          |\").split(\"|\")]\n\n    headers = split_row(lines[0])\n    body_lines\
          \ = lines[2:]\n    rows = []\n    for line in body_lines:\n        if \"\
          |\" not in line:\n            continue\n        parts = split_row(line)\n\
          \        if len(parts) < len(headers):\n            parts.extend([\"\"]\
          \ * (len(headers) - len(parts)))\n        rows.append(parts[: len(headers)])\n\
          \    if not headers or not rows:\n        return \"\"\n\n    widths = [len(head)\
          \ for head in headers]\n    for row in rows:\n        for idx, cell in enumerate(row):\n\
          \            widths[idx] = max(widths[idx], len(cell))\n\n    def fmt_row(row):\n\
          \        return \" | \".join(cell.ljust(widths[idx]) for idx, cell in enumerate(row))\n\
          \n    parts = [fmt_row(headers), \"-+-\".join(\"-\" * width for width in\
          \ widths)]\n    parts.extend(fmt_row(row) for row in rows)\n    return \"\
          \\n\".join(parts)\n\n\ndef _tables_to_text(text):\n    blocks = _extract_markdown_tables(text)\n\
          \    rendered = []\n    for idx, block in enumerate(blocks, start=1):\n\
          \        table_text = _table_block_to_text(block)\n        if table_text:\n\
          \            rendered.append(f\"[表{idx}]\\n{table_text}\")\n    return \"\
          \\n\\n\".join(rendered)\n\n\ndef _trim_report_for_llm(text, max_chars=12000):\n\
          \    raw = str(text or \"\").strip()\n    if not raw:\n        return \"\
          \"\n    for marker in (\"\\n## 波形图\", \"\\n## 怎么读这些图\"):\n        if marker\
          \ in raw:\n            raw = raw.split(marker, 1)[0].strip()\n    if len(raw)\
          \ <= max_chars:\n        return raw\n    return raw[:max_chars].rstrip()\
          \ + \"\\n\\n[后续内容已截断]\"\n\n\ndef _compact_latest_payload(payload):\n   \
          \ keep_keys = [\n        \"workflow_type\",\n        \"generated_at_ms\"\
          ,\n        \"status\",\n        \"baseline\",\n        \"primary_issue\"\
          ,\n        \"preferred_issue\",\n        \"rope_primary\",\n        \"rubber_primary\",\n        \"top_candidate\",\n        \"\
          watch_faults\",\n        \"auxiliary_results\",\n        \"risk\",\n   \
          \     \"recommendation\",\n        \"latest_file\",\n        \"latest_file_name\"\
          ,\n        \"requested_elevator_id\",\n        \"system_abnormality\",\n\
          \        \"report_summary\",\n    ]\n    compact = {}\n    for key in\
          \ keep_keys:\n        if key in payload:\n            compact[key] = payload.get(key)\n\
          \    return compact\n\n\ndef main(body):\n    text = str(body or \"\").strip()\n\
          \    try:\n        payload = json.loads(text) if text else {}\n    except\
          \ Exception:\n        payload = {\"status\": \"unknown\", \"detail\": \"\
          latest status payload is not valid json\"}\n\n    payload = _as_dict(payload)\n\
          \    status = str(payload.get(\"status\", \"unknown\"))\n    risk = _as_dict(payload.get(\"\
          risk\"))\n    primary_issue = _as_dict(payload.get(\"primary_issue\"))\n\
          \    system_abnormality = _as_dict(payload.get(\"system_abnormality\"))\n\
          \    preferred = _as_dict(payload.get(\"preferred_issue\"))\n    top_candidate = _as_dict(payload.get(\"\
          top_candidate\"))\n    waveforms = _as_dict(payload.get(\"waveform_payload\"\
          ))\n    report_markdown_draft = str(payload.get(\"report_markdown_draft\"\
          , \"\")).strip()\n    requested_elevator_id = str(payload.get(\"requested_elevator_id\"\
          , \"\")).strip()\n    latest_file = str(payload.get(\"latest_file_name\"\
          ) or payload.get(\"latest_file\") or \"\")\n    detected_at = _format_detected_at(payload.get(\"\
          generated_at_ms\"))\n    fault_type = _fault_text(primary_issue, preferred,\
          \ top_candidate)\n    display_conclusion = _display_conclusion(status, fault_type)\n\
          \    fault_score = primary_issue.get(\"score\", preferred.get(\"score\"\
          , top_candidate.get(\"score\", 0)))\n    abnormal_score = system_abnormality.get(\"score\",\
          \ 0)\n    baseline_mode = str(system_abnormality.get(\"baseline_mode\", \"unknown\"\
          ))\n    risk_now = str(risk.get(\"risk_level_now\", \"unknown\"))\n \
          \   risk_24h = str(risk.get(\"risk_level_24h\", \"unknown\"))\n    compact_payload\
          \ = _compact_latest_payload(payload)\n\
          \    report_markdown_for_llm = _trim_report_for_llm(report_markdown_draft)\n\
          \    summary = (\n        f\"检测日期={detected_at}; 状态={status}; 主结论={display_conclusion};\
          \ 分数={fault_score}; 异常分={abnormal_score}; 基线模式={baseline_mode}; 归因口径=按梯健康基线偏移+经验模板弱先验; 当前风险={risk_now}; 24h风险={risk_24h};\
          \ 目标电梯={requested_elevator_id or 'default'}; 最新文件={latest_file}; 后端报告={'已生成'\
          \ if report_markdown_draft else '未生成'}\"\n    )\n    return {\n        \"\
          status_json\": json.dumps(compact_payload, ensure_ascii=False),\n      \
          \  \"status_summary\": summary,\n        \"detected_at\": detected_at,\n\
          \        \"report_markdown_draft\": report_markdown_draft,\n        \"report_markdown_for_llm\"\
          : report_markdown_for_llm,\n        \"report_tables_html\": _tables_to_html(report_markdown_draft),\n\
          \        \"report_tables_text\": _tables_to_text(report_markdown_draft),\n\
          \        \"waveform_markdown\": str(waveforms.get(\"markdown_echarts\")\
          \ or waveforms.get(\"markdown\", \"\")).strip(),\n        \"waveform_insights\"\
          : str(waveforms.get(\"insight_markdown\", \"\")).strip(),\n        \"display_conclusion\"\
          : display_conclusion,\n        \"spectrum_chart\": _option_json(waveforms,\
          \ \"low_frequency_spectrum\"),\n        \"acc_chart\": _option_json(waveforms,\
          \ \"acceleration\"),\n        \"gyro_chart\": _option_json(waveforms, \"\
          gyroscope\"),\n        \"mag_chart\": _option_json(waveforms, \"acceleration_magnitude\"\
          ),\n    }\n"
        code_language: python3
        desc: ''
        outputs:
          acc_chart:
            children: null
            type: string
          detected_at:
            children: null
            type: string
          display_conclusion:
