        code: "import json\n\n\ndef _as_dict(value):\n    return value if isinstance(value,\
          \ dict) else {}\n\n\ndef _fault_text(primary, candidate):\n    fault_type\
          \ = str(primary.get(\"fault_type\") or candidate.get(\"fault_type\") or\
          \ \"none\")\n    if fault_type == \"rope_tension_abnormal\":\n        return\
          \ \"钢丝绳状态异常\"\n    if fault_type == \"rope_looseness\":\n        return\
          \ \"钢丝绳松动或张力不均\"\n    if fault_type == \"rubber_hardening\":\n        return\
          \ \"橡胶圈硬化\"\n    if fault_type == \"unknown\":\n        return \"异常类型待确认\"\
          \n    return fault_type\n\n\ndef main(body):\n    text = str(body or \"\"\
          ).strip()\n    try:\n        payload = json.loads(text) if text else {}\n\
          \    except Exception:\n        payload = {}\n    payload = payload if isinstance(payload,\
          \ dict) else {}\n    screening = _as_dict(payload.get(\"screening\"))\n\
          \    status = str(screening.get(\"status\", \"unknown\"))\n    primary_issue\
          \ = _as_dict(payload.get(\"primary_issue\"))\n    system_abnormality = _as_dict(payload.get(\"\
          system_abnormality\"))\n    top_candidate = _as_dict(payload.get(\"top_candidate\"\
          ))\n    baseline_mode = str(system_abnormality.get(\"baseline_mode\", \"unknown\"\
          ))\n    if primary_issue.get(\"fault_type\") or top_candidate.get(\"fault_type\"\
          ):\n        summary = (\n            f\"筛查状态：{status}；主结论：{_fault_text(primary_issue,\
          \ top_candidate)}；\"\n            f\"分数：{primary_issue.get('score', top_candidate.get('score',\
          \ 0))}；异常分：{system_abnormality.get('score', 0)}；基线模式：{baseline_mode}；归因口径：按梯健康基线偏移 + 经验模板弱先验。\"\n\
          \        )\n    else:\n        summary = f\"筛查状态：{status}；异常分：{system_abnormality.get('score',\
          \ 0)}；基线模式：{baseline_mode}；归因口径：按梯健康基线偏移 + 经验模板弱先验。\"\n    return {\n        \"diagnosis_json\": json.dumps(payload,\
          \ ensure_ascii=False),\n        \"diagnosis_summary\": summary,\n    }\n"
