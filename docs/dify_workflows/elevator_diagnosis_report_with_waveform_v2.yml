    - data:
        code: "import csv\nimport io\nimport json\nimport math\n\n\ndef _safe_float(value,\
          \ default=0.0):\n    try:\n        return float(value)\n    except Exception:\n\
          \        return default\n\n\ndef _safe_int(value):\n    try:\n        return\
          \ int(float(value))\n    except Exception:\n        return None\n\n\ndef\
          \ _rows_from_csv(text):\n    raw = str(text or \"\").strip()\n    if not\
          \ raw:\n        return []\n    return [dict(row) for row in csv.DictReader(io.StringIO(raw))]\n\
          \n\ndef _pick_effective_rows(rows, min_real_rows=8):\n    flagged = []\n\
          \    has_flag = False\n    for row in rows:\n        flag = _safe_int(row.get(\"\
          is_new_frame\"))\n        if flag is None:\n            continue\n     \
          \   has_flag = True\n        if flag == 1:\n            flagged.append(row)\n\
          \    if has_flag and len(flagged) >= min_real_rows:\n        return flagged,\
          \ True\n    return rows, False\n\n\ndef _pick(row, *names):\n    for name\
          \ in names:\n        if name in row and str(row.get(name)).strip() != \"\
          \":\n            return row.get(name)\n    return \"\"\n\n\ndef _extract_series(rows,\
          \ *names):\n    return [_safe_float(_pick(row, *names), 0.0) for row in\
          \ rows]\n\n\ndef _extract_ts(rows):\n    xs = []\n    for idx, row in enumerate(rows):\n\
          \        value = _safe_int(_pick(row, \"ts_ms\", \"data_ts_ms\"))\n    \
          \    xs.append(idx if value is None else value)\n    return xs\n\n\ndef\
          \ _downsample(xs, series_list, max_points=180):\n    if len(xs) <= max_points:\n\
          \        return xs, series_list\n    idxs = [round(i * (len(xs) - 1) / max(1,\
          \ max_points - 1)) for i in range(max_points)]\n    return [xs[i] for i\
          \ in idxs], [[series[i] for i in idxs] for series in series_list]\n\n\n\
          def _option(title, xs, series_defs):\n    x0 = xs[0] if xs else 0\n    x_data\
          \ = [round((value - x0) / 1000.0, 3) for value in xs]\n    option = {\n\
          \        \"title\": {\"text\": title, \"left\": \"center\"},\n        \"\
          tooltip\": {\"trigger\": \"axis\"},\n        \"legend\": {\"top\": 28, \"\
          data\": [item[\"name\"] for item in series_defs]},\n        \"grid\": {\"\
          left\": 48, \"right\": 24, \"top\": 72, \"bottom\": 36},\n        \"xAxis\"\
          : {\n            \"type\": \"category\",\n            \"name\": \"Time (s)\"\
          ,\n            \"boundaryGap\": False,\n            \"data\": x_data,\n\
          \        },\n        \"yAxis\": {\n            \"type\": \"value\",\n  \
          \          \"scale\": True,\n        },\n        \"series\": [],\n    }\n\
          \    for item in series_defs:\n        option[\"series\"].append(\n    \
          \        {\n                \"name\": item[\"name\"],\n                \"\
          type\": \"line\",\n                \"showSymbol\": False,\n            \
          \    \"smooth\": False,\n                \"lineStyle\": {\"width\": 2, \"\
          color\": item[\"color\"]},\n                \"itemStyle\": {\"color\": item[\"\
          color\"]},\n                \"data\": [round(float(v), 6) for v in item[\"\
          data\"]],\n            }\n        )\n    return json.dumps(option, ensure_ascii=False)\n\
          \n\ndef main(csv_text):\n    rows = _rows_from_csv(csv_text)\n    rows,\
          \ used_new_only = _pick_effective_rows(rows)\n    ts = _extract_ts(rows)\n\
          \    ax = _extract_series(rows, \"Ax\", \"AX\")\n    ay = _extract_series(rows,\
          \ \"Ay\", \"AY\")\n    az = _extract_series(rows, \"Az\", \"AZ\")\n    gx\
          \ = _extract_series(rows, \"Gx\", \"GX\")\n    gy = _extract_series(rows,\
          \ \"Gy\", \"GY\")\n    gz = _extract_series(rows, \"Gz\", \"GZ\")\n    amag\
          \ = [math.sqrt(ax[i] * ax[i] + ay[i] * ay[i] + az[i] * az[i]) for i in range(len(ax))]\n\
          \n    ts_acc, [ax, ay, az] = _downsample(ts, [ax, ay, az])\n    ts_gyr,\
          \ [gx, gy, gz] = _downsample(ts, [gx, gy, gz])\n    ts_mag, [amag] = _downsample(ts,\
          \ [amag])\n\n    acc_chart = _option(\n        \"加速度三轴波形\",\n        ts_acc,\n\
          \        [\n            {\"name\": \"Ax\", \"color\": \"#1F77B4\", \"data\"\
          : ax},\n            {\"name\": \"Ay\", \"color\": \"#FF7F0E\", \"data\"\
          : ay},\n            {\"name\": \"Az\", \"color\": \"#2CA02C\", \"data\"\
          : az},\n        ],\n    )\n    gyro_chart = _option(\n        \"角速度三轴波形\"\
          ,\n        ts_gyr,\n        [\n            {\"name\": \"Gx\", \"color\"\
          : \"#9467BD\", \"data\": gx},\n            {\"name\": \"Gy\", \"color\"\
          : \"#D62728\", \"data\": gy},\n            {\"name\": \"Gz\", \"color\"\
          : \"#8C564B\", \"data\": gz},\n        ],\n    )\n    mag_chart = _option(\n\
          \        \"加速度合成幅值波形\",\n        ts_mag,\n        [\n            {\"name\"\
          : \"A_mag\", \"color\": \"#17BECF\", \"data\": amag},\n        ],\n    )\n\
          \    summary = (\n        f\"本次用于绘图的有效数据点共 {len(rows)} 个，\"\n        f\"\
          {'已优先使用 is_new_frame=1 的真实采样点。' if used_new_only else '未检测到足够多的真实采样标记，直接使用原始记录绘图。'}\"\
          \n    )\n    return {\n        \"acc_chart\": acc_chart,\n        \"gyro_chart\"\
          : gyro_chart,\n        \"mag_chart\": mag_chart,\n        \"waveform_summary\"\
          : summary,\n    }\n"
        code_language: python3
        desc: ''
