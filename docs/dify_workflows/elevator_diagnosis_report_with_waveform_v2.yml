        title: 读取最新状态
        type: http-request
        url: '{{#env.ip#}}/api/v1/diagnostics/latest-status?latest_json={{#env.latest_json#}}&latest_root={{#env.latest_root#}}&elevator_id={{#status_target.elevator_id#}}&include_waveforms=true'
