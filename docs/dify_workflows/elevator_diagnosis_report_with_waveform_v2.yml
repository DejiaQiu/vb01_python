    - data:
        code: "import csv\nimport io\nimport json\n\n\ndef _pick_text(value):\n  \
          \  if isinstance(value, list):\n        for item in value:\n           \
          \ text = str(item).strip()\n            if text:\n                return\
          \ text\n        return \"\"\n    return str(value or \"\").strip()\n\n\n\
          def _from_markdown_table(text):\n    lines = [line.rstrip() for line in\
          \ text.splitlines() if line.strip()]\n    if len(lines) < 2:\n        return\
          \ \"\"\n    if \"|\" not in lines[0] or \"---\" not in lines[1]:\n     \
          \   return \"\"\n\n    def split_row(line):\n        return [part.strip()\
          \ for part in line.strip().strip(\"|\").split(\"|\")]\n\n    headers = split_row(lines[0])\n\
          \    if not headers:\n        return \"\"\n\n    rows = []\n    for line\
          \ in lines[2:]:\n        if \"|\" not in line:\n            continue\n \
          \       parts = split_row(line)\n        if len(parts) < len(headers):\n\
          \            parts.extend([\"\"] * (len(headers) - len(parts)))\n      \
          \  rows.append(parts[: len(headers)])\n\n    if not rows:\n        return\
          \ \"\"\n\n    buffer = io.StringIO()\n    writer = csv.writer(buffer)\n\
          \    writer.writerow(headers)\n    writer.writerows(rows)\n    return buffer.getvalue()\n\
          \n\ndef _normalize_csv_like(text):\n    sample = text[:2048]\n    try:\n\
          \        dialect = csv.Sniffer().sniff(sample, delimiters=\",;\\t\")\n \
          \   except Exception:\n        dialect = csv.excel\n\n    rows = []\n  \
          \  reader = csv.reader(io.StringIO(text), dialect)\n    for row in reader:\n\
          \        if any(str(cell).strip() for cell in row):\n            rows.append([str(cell).strip()\
          \ for cell in row])\n\n    if len(rows) < 2:\n        return text\n\n  \
          \  width = max(len(row) for row in rows)\n    buffer = io.StringIO()\n \
          \   writer = csv.writer(buffer)\n    for row in rows:\n        writer.writerow(row\
          \ + [\"\"] * (width - len(row)))\n    return buffer.getvalue()\n\n\ndef\
          \ _sample_rows(rows, limit):\n    if len(rows) <= limit:\n        return\
          \ rows\n    if limit <= 1:\n        return rows[:1]\n    idxs = []\n   \
          \ for i in range(limit):\n        idx = round(i * (len(rows) - 1) / max(1,\
          \ limit - 1))\n        if not idxs or idx != idxs[-1]:\n            idxs.append(idx)\n\
          \    return [rows[i] for i in idxs]\n\n\n\
          def _compact_csv_text(text, max_rows=2000, max_chars=280000):\n    raw\
          \ = str(text or \"\").strip()\n    if not raw:\n        return \"\"\n \
          \   parsed = list(csv.reader(io.StringIO(raw)))\n    if len(parsed) <= 1:\n\
          \        return raw[:max_chars]\n\n    header = [str(cell).strip() for\
          \ cell in parsed[0]]\n    data_rows = [[str(cell).strip() for cell in row]\
          \ for row in parsed[1:] if any(str(cell).strip() for cell in row)]\n   \
          \ if not data_rows:\n        buffer = io.StringIO()\n        writer = csv.writer(buffer)\n\
          \        writer.writerow(header)\n        return buffer.getvalue()[:max_chars]\n\
          \n    current_limit = max_rows\n    while True:\n        sampled = _sample_rows(data_rows,\
          \ current_limit)\n        width = max([len(header)] + [len(row) for row\
          \ in sampled])\n        buffer = io.StringIO()\n        writer = csv.writer(buffer)\n\
          \        writer.writerow(header + [\"\"] * (width - len(header)))\n    \
          \    for row in sampled:\n            writer.writerow(row + [\"\"] * (width\
          \ - len(row)))\n        compact = buffer.getvalue()\n        if len(compact)\
          \ <= max_chars or current_limit <= 64:\n            return compact[:max_chars]\n\
          \        current_limit = max(64, int(current_limit * 0.7))\n\n\ndef main(extracted_text,\
          \ site_name):\n    raw_text = _pick_text(extracted_text)\n    normalized\
          \ = _from_markdown_table(raw_text) or _normalize_csv_like(raw_text)\n  \
          \  csv_text = _compact_csv_text(normalized)\n    diagnosis_body = json.dumps(\n\
          \        {\"csv_text\": csv_text, \"rows\": []},\n        ensure_ascii=False,\n\
          \    )\n    maintenance_body = json.dumps(\n        {\"site_name\": site_name\
          \ or \"unknown-site\"},\n        ensure_ascii=False,\n    )\n    return\
          \ {\n        \"csv_text\": csv_text,\n        \"diagnosis_body\": diagnosis_body,\n\
          \        \"maintenance_body\": maintenance_body,\n    }\n"
        code_language: python3
        desc: ''
        outputs:
          csv_text:
            children: null
            type: string
          diagnosis_body:
            children: null
            type: string
          maintenance_body:
            children: null
            type: string
        selected: false
        title: 准备CSV与请求体
        type: code
        variables:
        - value_selector:
          - doc_extract
