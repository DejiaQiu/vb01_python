          \ dict) else {}\n    dify_prompt = str(payload.get(\"dify_prompt_template\"\
          , \"\")).strip()\n    dify_inputs = payload.get(\"dify_report_inputs\",\
          \ {})\n    waveforms = _as_dict(payload.get(\"waveform_payload\"))\n   \
          \ report_markdown = str(payload.get(\"report_markdown_draft\", \"\")).strip()\n\
