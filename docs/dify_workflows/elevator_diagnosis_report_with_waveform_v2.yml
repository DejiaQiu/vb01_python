        code: |
          import json
          
          
          def _loads(text):
              raw = str(text or "").strip()
              if not raw:
                  return {}
              try:
                  return json.loads(raw)
              except Exception:
                  return {}
          
          
          def main(site_name, csv_text, diagnosis_json, maintenance_json):
              payload = {
                  "site_name": site_name or "unknown-site",
                  "csv_text": csv_text or "",
                  "diagnosis_result": _loads(diagnosis_json),
                  "maintenance_package": _loads(maintenance_json),
                  "include_waveforms": False,
                  "language": "zh-CN",
                  "report_style": "standard",
              }
              return {
                  "report_body": json.dumps(payload, ensure_ascii=False),
              }
