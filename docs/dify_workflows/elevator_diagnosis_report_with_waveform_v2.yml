          import json
          
          
          def _as_dict(value):
              return value if isinstance(value, dict) else {}
          
          
          def main(body):
              text = str(body or "").strip()
              try:
                  payload = json.loads(text) if text else {}
              except Exception:
                  payload = {"status": "unknown", "detail": "latest status payload is not valid json"}
          
              payload = _as_dict(payload)
              status = str(payload.get("status", "unknown"))
              risk = _as_dict(payload.get("risk"))
              preferred = _as_dict(payload.get("preferred_issue"))
              top_candidate = _as_dict(payload.get("top_candidate"))
              latest_file = str(payload.get("latest_file_name") or payload.get("latest_file") or "")
              fault_type = str(preferred.get("fault_type") or top_candidate.get("fault_type") or "none")
              fault_score = preferred.get("score", top_candidate.get("score", 0))
              risk_now = str(risk.get("risk_level_now", "unknown"))
              risk_24h = str(risk.get("risk_level_24h", "unknown"))
              summary = (
                  f"状态={status}; 候选故障={fault_type}; 分数={fault_score}; "
                  f"当前风险={risk_now}; 24h风险={risk_24h}; 最新文件={latest_file}"
              )
              return {
                  "status_json": json.dumps(payload, ensure_ascii=False),
                  "status_summary": summary,
              }
