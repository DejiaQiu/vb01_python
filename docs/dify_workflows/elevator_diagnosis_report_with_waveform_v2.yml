    - data:
        code: "import json\nfrom datetime import datetime\n\n\ndef _as_dict(value):\n\
          \    return value if isinstance(value, dict) else {}\n\n\ndef _format_detected_at(value):\n\
          \    try:\n        ts_ms = int(float(value))\n    except (TypeError, ValueError):\n\
          \        return \"未提供\"\n    if ts_ms <= 0:\n        return \"未提供\"\n \
          \   return datetime.fromtimestamp(ts_ms / 1000.0).strftime(\"%Y-%m-%d %H:%M:%S\")\n\n\n\
          def _option_json(payload, key):\n    echarts = _as_dict(payload.get(\"echarts\"\
          ))\n    item = _as_dict(echarts.get(key))\n    return str(item.get(\"option_json\"\
          ) or \"\").strip()\n\n\n\
          def _fault_text(primary, preferred, candidate):\n    fault_type = str(primary.get(\"\
          fault_type\") or preferred.get(\"fault_type\") or candidate.get(\"fault_type\") or \"\
          none\")\n    if fault_type == \"rope_tension_abnormal\":\n        return \"钢丝绳状态异常\"\
          \n    if fault_type == \"rope_looseness\":\n        return \"钢丝绳松动或张力不均\"\
          \n    if fault_type == \"rubber_hardening\":\n        return \"橡胶圈硬化\"\
          \n    if fault_type == \"unknown\":\n        return \"异常类型待确认\"\n    return fault_type\n\n\n\
          def main(body):\n    text = str(body or \"\").strip()\n    try:\n     \
          \   payload = json.loads(text) if text else {}\n    except Exception:\n\
          \        payload = {\"status\": \"unknown\", \"detail\": \"latest status payload is\
          \ not valid json\"}\n\n    payload = _as_dict(payload)\n    status = str(payload.get(\"\
          status\", \"unknown\"))\n    risk = _as_dict(payload.get(\"risk\"))\n  \
          \  primary_issue = _as_dict(payload.get(\"primary_issue\"))\n    rope_primary = _as_dict(payload.get(\"rope_primary\"))\n    preferred = _as_dict(payload.get(\"\
          preferred_issue\"))\n    top_candidate = _as_dict(payload.get(\"top_candidate\"\
          ))\n    auxiliary_results = payload.get(\"auxiliary_results\", []) if isinstance(payload.get(\"\
          auxiliary_results\"), list) else []\n    first_aux = auxiliary_results[0] if auxiliary_results and isinstance(auxiliary_results[0], dict) else {}\n\
          \    waveforms = _as_dict(payload.get(\"waveform_payload\"))\n    latest_file = str(payload.get(\"\
          latest_file_name\") or payload.get(\"latest_file\") or \"\")\n    detected_at = _format_detected_at(payload.get(\"\
          generated_at_ms\"))\n    fault_type = _fault_text(primary_issue, preferred, top_candidate)\n\
          \    fault_score = primary_issue.get(\"score\", preferred.get(\"score\", top_candidate.get(\"\
          score\", 0)))\n    risk_now = str(risk.get(\"risk_level_now\", \"unknown\"\
          ))\n    risk_24h = str(risk.get(\"risk_level_24h\", \"unknown\"))\n    rope_branch = str(rope_primary.get(\"\
          rope_branch\", \"\")).strip()\n    aux_fault = str(first_aux.get(\"fault_type\"\
          , \"none\") or \"none\")\n    aux_score = first_aux.get(\"score\", 0)\n    summary\
          \ = (\n        f\"检测日期={detected_at}; 状态={status}; 主结论={fault_type};\
          \ 分数={fault_score}; \"\n        f\"分支={rope_branch or 'unknown'}; 当前风险={risk_now};\
          \ 24h风险={risk_24h}; 辅助异常={aux_fault}; 辅助分数={aux_score}; 最新文件={latest_file}\"\
          \n    )\n    return {\n        \"status_json\": json.dumps(payload, ensure_ascii=False),\n\
          \        \"status_summary\": summary,\n        \"detected_at\": detected_at,\n\
          \        \"acc_chart\": _option_json(waveforms, \"acceleration\"),\n   \
          \     \"gyro_chart\": _option_json(waveforms, \"gyroscope\"),\n        \"\
          mag_chart\": _option_json(waveforms, \"acceleration_magnitude\"),\n    }\n"
        code_language: python3
        desc: ''
        outputs:
