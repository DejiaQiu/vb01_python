    - data:
        code: |
          import csv
          import io
          import json
          import math
          
          
          def _safe_float(value, default=0.0):
              try:
                  return float(value)
              except Exception:
                  return default
          
          
          def _safe_int(value):
              try:
                  return int(float(value))
              except Exception:
                  return None
          
          
          def _rows_from_csv(text):
              raw = str(text or "").strip()
              if not raw:
                  return []
              return [dict(row) for row in csv.DictReader(io.StringIO(raw))]
          
          
          def _pick_effective_rows(rows, min_real_rows=8):
              flagged = []
              has_flag = False
              for row in rows:
                  flag = _safe_int(row.get("is_new_frame"))
                  if flag is None:
                      continue
                  has_flag = True
                  if flag == 1:
                      flagged.append(row)
              if has_flag and len(flagged) >= min_real_rows:
                  return flagged, True
              return rows, False
          
          
          def _pick(row, *names):
              for name in names:
                  if name in row and str(row.get(name)).strip() != "":
                      return row.get(name)
              return ""
          
          
          def _extract_series(rows, *names):
              return [_safe_float(_pick(row, *names), 0.0) for row in rows]
          
          
          def _extract_ts(rows):
              xs = []
              for idx, row in enumerate(rows):
                  value = _safe_int(_pick(row, "ts_ms", "data_ts_ms"))
                  xs.append(idx if value is None else value)
              return xs
          
          
          def _downsample(xs, series_list, max_points=180):
              if len(xs) <= max_points:
                  return xs, series_list
              idxs = [round(i * (len(xs) - 1) / max(1, max_points - 1)) for i in range(max_points)]
              return [xs[i] for i in idxs], [[series[i] for i in idxs] for series in series_list]
          
          
          def _option(title, xs, series_defs):
              x0 = xs[0] if xs else 0
              x_data = [round((value - x0) / 1000.0, 3) for value in xs]
              option = {
                  "title": {"text": title, "left": "center"},
                  "tooltip": {"trigger": "axis"},
                  "legend": {"top": 28, "data": [item["name"] for item in series_defs]},
                  "grid": {"left": 48, "right": 24, "top": 72, "bottom": 36},
                  "xAxis": {
                      "type": "category",
                      "name": "Time (s)",
                      "boundaryGap": False,
                      "data": x_data,
                  },
                  "yAxis": {
                      "type": "value",
                      "scale": True,
                  },
                  "series": [],
              }
              for item in series_defs:
                  option["series"].append(
                      {
                          "name": item["name"],
                          "type": "line",
                          "showSymbol": False,
                          "smooth": False,
                          "lineStyle": {"width": 2, "color": item["color"]},
                          "itemStyle": {"color": item["color"]},
                          "data": [round(float(v), 6) for v in item["data"]],
                      }
                  )
              return json.dumps(option, ensure_ascii=False)
          
          
          def main(csv_text):
              rows = _rows_from_csv(csv_text)
              rows, used_new_only = _pick_effective_rows(rows)
              ts = _extract_ts(rows)
              ax = _extract_series(rows, "Ax", "AX")
              ay = _extract_series(rows, "Ay", "AY")
              az = _extract_series(rows, "Az", "AZ")
              gx = _extract_series(rows, "Gx", "GX")
              gy = _extract_series(rows, "Gy", "GY")
              gz = _extract_series(rows, "Gz", "GZ")
              amag = [math.sqrt(ax[i] * ax[i] + ay[i] * ay[i] + az[i] * az[i]) for i in range(len(ax))]
          
              ts_acc, [ax, ay, az] = _downsample(ts, [ax, ay, az])
              ts_gyr, [gx, gy, gz] = _downsample(ts, [gx, gy, gz])
              ts_mag, [amag] = _downsample(ts, [amag])
          
              acc_chart = _option(
                  "加速度三轴波形",
                  ts_acc,
                  [
                      {"name": "Ax", "color": "#1F77B4", "data": ax},
