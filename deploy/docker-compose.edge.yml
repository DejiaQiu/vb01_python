services:
  elevator-edge:
    build:
      context: ..
      dockerfile: Dockerfile.edge
    container_name: elevator-edge
    restart: unless-stopped
    command:
      - python
      - -m
      - elevator_monitor.realtime_monitor
    environment:
      - MONITOR_ELEVATOR_ID=${MONITOR_ELEVATOR_ID:-}
      - MONITOR_DEVICE_NAME=${MONITOR_DEVICE_NAME:-}
      - MONITOR_PORT=${MONITOR_PORT:-}
      - MONITOR_BAUD=${MONITOR_BAUD:-}
      - MONITOR_ADDR=${MONITOR_ADDR:-}
      - MONITOR_SAMPLE_HZ=${MONITOR_SAMPLE_HZ:-}
      - MONITOR_DETECT_HZ=${MONITOR_DETECT_HZ:-}
      - MONITOR_REG_ADDR=${MONITOR_REG_ADDR:-}
      - MONITOR_REG_COUNT=${MONITOR_REG_COUNT:-}
      - MONITOR_MAX_DATA_AGE_MS=${MONITOR_MAX_DATA_AGE_MS:-}
      - MONITOR_RECONNECT_NO_DATA_S=${MONITOR_RECONNECT_NO_DATA_S:-}
      - MONITOR_RECONNECT_BACKOFF_S=${MONITOR_RECONNECT_BACKOFF_S:-}
      - MONITOR_LOG_LEVEL=${MONITOR_LOG_LEVEL:-}
      - MONITOR_FAULT_TYPE_ENABLED=${MONITOR_FAULT_TYPE_ENABLED:-}
      - MONITOR_FAULT_TYPE_MIN_LEVEL=${MONITOR_FAULT_TYPE_MIN_LEVEL:-}
      - MONITOR_FAULT_TYPE_TOP_K=${MONITOR_FAULT_TYPE_TOP_K:-}
      - MONITOR_FAULT_BASELINE_SIZE=${MONITOR_FAULT_BASELINE_SIZE:-}
      - MONITOR_FAULT_BASELINE_MIN_RECORDS=${MONITOR_FAULT_BASELINE_MIN_RECORDS:-}
      - MONITOR_FAULT_VIBRATION_WARNING_Z=${MONITOR_FAULT_VIBRATION_WARNING_Z:-}
      - MONITOR_FAULT_VIBRATION_SHOCK_Z=${MONITOR_FAULT_VIBRATION_SHOCK_Z:-}
      - MONITOR_FAULT_TEMP_RISE_C=${MONITOR_FAULT_TEMP_RISE_C:-}
      - MONITOR_FAULT_TEMP_OVERHEAT_C=${MONITOR_FAULT_TEMP_OVERHEAT_C:-}
      - MONITOR_FAULT_MODEL_PATH=${MONITOR_FAULT_MODEL_PATH:-}
      - MONITOR_FAULT_MODEL_MIN_CONFIDENCE=${MONITOR_FAULT_MODEL_MIN_CONFIDENCE:-}
      - MONITOR_FAULT_MODEL_TOP_K=${MONITOR_FAULT_MODEL_TOP_K:-}
      - MONITOR_FAULT_FUSION_MODE=${MONITOR_FAULT_FUSION_MODE:-}
      - MONITOR_GENERATED_ALGO_PATH=${MONITOR_GENERATED_ALGO_PATH:-}
      - MONITOR_GENERATED_ALGO_MIN_CONFIDENCE=${MONITOR_GENERATED_ALGO_MIN_CONFIDENCE:-}
      - MONITOR_GENERATED_ALGO_TOP_K=${MONITOR_GENERATED_ALGO_TOP_K:-}
      - MONITOR_GENERATED_ALGO_HORIZON_S=${MONITOR_GENERATED_ALGO_HORIZON_S:-}
      - MONITOR_GENERATED_ALGO_FORECAST_MIN_POINTS=${MONITOR_GENERATED_ALGO_FORECAST_MIN_POINTS:-}
      - MONITOR_RISK_ENABLED=${MONITOR_RISK_ENABLED:-}
      - MONITOR_RISK_EMIT_ON_NORMAL=${MONITOR_RISK_EMIT_ON_NORMAL:-}
      - MONITOR_RISK_EMIT_MIN_LEVEL=${MONITOR_RISK_EMIT_MIN_LEVEL:-}
      - MONITOR_RISK_BASELINE_SIZE=${MONITOR_RISK_BASELINE_SIZE:-}
      - MONITOR_RISK_BASELINE_MIN_RECORDS=${MONITOR_RISK_BASELINE_MIN_RECORDS:-}
      - MONITOR_RISK_TREND_WINDOW_S=${MONITOR_RISK_TREND_WINDOW_S:-}
      - MONITOR_RISK_SMOOTH_ALPHA=${MONITOR_RISK_SMOOTH_ALPHA:-}
      - MONITOR_RISK_ANOMALY_SCALE=${MONITOR_RISK_ANOMALY_SCALE:-}
      - MONITOR_RISK_FAULT_WEIGHT=${MONITOR_RISK_FAULT_WEIGHT:-}
      - MONITOR_RISK_VIBRATION_WEIGHT=${MONITOR_RISK_VIBRATION_WEIGHT:-}
      - MONITOR_RISK_TEMPERATURE_WEIGHT=${MONITOR_RISK_TEMPERATURE_WEIGHT:-}
      - MONITOR_RISK_MODEL_PATH=${MONITOR_RISK_MODEL_PATH:-}
      - MONITOR_RISK_MODEL_POSITIVE_LABEL=${MONITOR_RISK_MODEL_POSITIVE_LABEL:-}
      - MONITOR_RISK_MODEL_WEIGHT=${MONITOR_RISK_MODEL_WEIGHT:-}
      - MONITOR_MODEL_WINDOW_S=${MONITOR_MODEL_WINDOW_S:-}
      - MONITOR_MODEL_WINDOW_MIN_SAMPLES=${MONITOR_MODEL_WINDOW_MIN_SAMPLES:-}
      - MONITOR_DIFY_ENABLED=${MONITOR_DIFY_ENABLED:-}
      - MONITOR_DIFY_BASE_URL=${MONITOR_DIFY_BASE_URL:-}
      - MONITOR_DIFY_API_KEY=${MONITOR_DIFY_API_KEY:-}
      - MONITOR_DIFY_USER=${MONITOR_DIFY_USER:-}
      - MONITOR_DIFY_RESPONSE_MODE=${MONITOR_DIFY_RESPONSE_MODE:-}
      - MONITOR_DIFY_TIMEOUT_S=${MONITOR_DIFY_TIMEOUT_S:-}
      - MONITOR_DIFY_VERIFY_SSL=${MONITOR_DIFY_VERIFY_SSL:-}
      - MONITOR_DIFY_MIN_LEVEL=${MONITOR_DIFY_MIN_LEVEL:-}
      - MONITOR_DIFY_COOLDOWN_S=${MONITOR_DIFY_COOLDOWN_S:-}
      - MONITOR_DIFY_SITE_NAME=${MONITOR_DIFY_SITE_NAME:-}
      - MONITOR_DIFY_MANIFEST_JSON=${MONITOR_DIFY_MANIFEST_JSON:-}
      - MONITOR_EDGE_SYNC_ENABLED=${MONITOR_EDGE_SYNC_ENABLED:-}
      - MONITOR_EDGE_SYNC_BASE_URL=${MONITOR_EDGE_SYNC_BASE_URL:-}
      - MONITOR_EDGE_SYNC_API_TOKEN=${MONITOR_EDGE_SYNC_API_TOKEN:-}
      - MONITOR_EDGE_SYNC_SITE_ID=${MONITOR_EDGE_SYNC_SITE_ID:-}
      - MONITOR_EDGE_SYNC_SITE_NAME=${MONITOR_EDGE_SYNC_SITE_NAME:-}
      - MONITOR_EDGE_SYNC_DEVICE_ID=${MONITOR_EDGE_SYNC_DEVICE_ID:-}
      - MONITOR_EDGE_SYNC_QUEUE_PATH=${MONITOR_EDGE_SYNC_QUEUE_PATH:-/app/data/edge_sync_queue.sqlite3}
      - MONITOR_EDGE_SYNC_HEARTBEAT_EVERY_S=${MONITOR_EDGE_SYNC_HEARTBEAT_EVERY_S:-}
      - MONITOR_EDGE_SYNC_TIMEOUT_S=${MONITOR_EDGE_SYNC_TIMEOUT_S:-}
      - MONITOR_EDGE_SYNC_VERIFY_SSL=${MONITOR_EDGE_SYNC_VERIFY_SSL:-}
      - MONITOR_EDGE_SYNC_DRAIN_EVERY_S=${MONITOR_EDGE_SYNC_DRAIN_EVERY_S:-}
      - MONITOR_EDGE_SYNC_DRAIN_BATCH_SIZE=${MONITOR_EDGE_SYNC_DRAIN_BATCH_SIZE:-}
      - MONITOR_EDGE_SYNC_MAX_CONTEXT_BYTES=${MONITOR_EDGE_SYNC_MAX_CONTEXT_BYTES:-}
      - MONITOR_OUTPUT_DATA=${MONITOR_OUTPUT_DATA:-/app/data/elevator_rt_live.csv}
      - MONITOR_OUTPUT_ALERT=${MONITOR_OUTPUT_ALERT:-/app/data/elevator_alerts_live.csv}
      - MONITOR_OUTPUT_RAIL_WEAR=${MONITOR_OUTPUT_RAIL_WEAR:-/app/data/rail_wear_alerts_live.csv}
      - MONITOR_ALERT_CONTEXT_ENABLED=${MONITOR_ALERT_CONTEXT_ENABLED:-}
      - MONITOR_ALERT_CONTEXT_DIR=${MONITOR_ALERT_CONTEXT_DIR:-/app/data/alert_context}
      - MONITOR_ALERT_CONTEXT_PRE_SECONDS=${MONITOR_ALERT_CONTEXT_PRE_SECONDS:-30}
      - MONITOR_ALERT_CONTEXT_MAX_ROWS=${MONITOR_ALERT_CONTEXT_MAX_ROWS:-6000}
      - MONITOR_PROFILE_PATH=${MONITOR_PROFILE_PATH:-/app/data/profiles/{elevator_id}.json}
      - MONITOR_PROFILE_SAVE_EVERY_N=${MONITOR_PROFILE_SAVE_EVERY_N:-300}
      - MONITOR_PROFILE_MAX_ITEMS=${MONITOR_PROFILE_MAX_ITEMS:-3000}
      - MONITOR_HEALTH_PATH=${MONITOR_HEALTH_PATH:-/app/data/monitor_health.json}
      - MONITOR_LOG_FILE=${MONITOR_LOG_FILE:-/app/logs/realtime_monitor.log}
    devices:
      - ${MONITOR_DEVICE_HOST:-/dev/ttyUSB0}:${MONITOR_DEVICE_CONTAINER:-/dev/ttyUSB0}
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-m", "elevator_monitor.healthcheck", "--health-path", "/app/data/monitor_health.json", "--max-age-s", "30"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
